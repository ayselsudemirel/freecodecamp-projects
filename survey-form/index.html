<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Survey Form</title>
</head>

<body>

  <h1 id="title">Student Feedback Survey</h1>

  <p id="description">
    Please fill out this short survey to help us improve future events.
  </p>

  <form id="survey-form">

    <label id="name-label" for="name">Name</label>
    <input
      id="name"
      type="text"
      name="name"
      placeholder="Enter your full name"
      required
    />

    <br><br>

    <label id="email-label" for="email">Email</label>
    <input
      id="email"
      type="email"
      name="email"
      placeholder="example@mail.com"
      required
    />

    <br><br>

    <label id="number-label" for="number">Age</label>
    <input
      id="number"
      type="number"
      name="age"
      min="10"
      max="99"
      placeholder="Enter your age"
    />

    <br><br>

    <p>Which option best describes you?</p>

    <select id="dropdown" name="role">
      <option value="">Select one</option>
      <option value="student">Student</option>
      <option value="working">Working Professional</option>
    </select>

    <br><br>

    <p>Would you recommend this event?</p>

    <label>
      <input type="radio" name="recommend" value="yes" />
      Yes
    </label>

    <label>
      <input type="radio" name="recommend" value="maybe" />
      Maybe
    </label>

    <label>
      <input type="radio" name="recommend" value="no" />
      No
    </label>

    <br><br>

    <p>What did you like? (Select all that apply)</p>

    <label>
      <input type="checkbox" name="liked" value="content" />
      Content
    </label>

    <label>
      <input type="checkbox" name="liked" value="speaker" />
      Speaker
    </label>

    <label>
      <input type="checkbox" name="liked" value="organization" />
      Organization
    </label>

    <br><br>

    <p>Additional comments</p>

    <textarea
      name="comment"
      rows="5"
      cols="30"
      placeholder="Write any suggestions or feedback here..."
    ></textarea>

    <br><br>

    <button id="submit" type="submit">Submit</button>

  </form>

</body>
</html>
