<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Post Card</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="blog-post-card">

    <img
      class="post-img"
      src="https://cdn.freecodecamp.org/curriculum/labs/cover-photo.jpg"
      alt="A colorful laptop and workspace">

    <div class="post-content">

      <h2 class="post-title">How to Learn CSS Faster</h2>

      <p class="post-excerpt">
        Learn simple techniques and daily habits that will help you master CSS more quickly and build beautiful websites.
      </p>

      <a class="read-more" href="#">Read More</a>

    </div>

  </div>
</body>
</html>
