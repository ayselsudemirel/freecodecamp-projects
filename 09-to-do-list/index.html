<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Styled To-Do List</title>

  <link rel="stylesheet" href="styles.css">
</head>

<body>
    <main class="todo-container">
    <h1>My To-Do List</h1>
<ul class="todo-list">
  <li>
    <input type="checkbox" id="task1">
    <label for="task1">Complate HTML</label>
    <ul class="sub-item">
        <li>
        <a class="sub-item-link" href="https://www.freecodecamp.org/" target="_blank">
          freeCodeCamp
        </a>
      </li>
  </ul>
  </li>
  <li>
    <input type="checkbox" id="task2">
     <label for="task2">Practice CSS</label>
     <ul class="sub-item">
        <li>
        <a class="sub-item-link" href="https://www.freecodecamp.org/" target="_blank">
          freeCodeCamp
        </a>
      </li>
  </ul>
  </li>
  <li>
    <input type="checkbox" id="task3">
     <label for="task3">Build a Project</label>
     <ul class="sub-item">
        <li>
        <a class="sub-item-link" href="https://github.com/" target="_blank">
          GitHub
        </a>
      </li>
  </ul>
  </li>
  <li>
    <input type="checkbox" id="task4">
    <label for="task4">Push to GitHub</label>
    <ul class="sub-item">
        <li>
        <a class="sub-item-link" href="https://github.com/" target="_blank">
          GitHub
        </a>
      </li>
  </ul>
  </li>
</ul>
</main>
</body>

</html>
